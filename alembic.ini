# Alembic configuration for a-sdlc
#
# This file is used only for local development (e.g. `alembic revision
# --autogenerate`). At runtime the server and the `a-sdlc db` CLI build a
# programmatic Config via a_sdlc.core.alembic_config (no ini file needed),
# pointing at the packaged migrations under src/a_sdlc/migrations so they
# ship inside the wheel and Docker image.
#
# The database URL is resolved at runtime by migrations/env.py using
# StorageConfig so that environment variables and config files are
# respected.  The value below is only used as a fallback when running
# alembic CLI directly without the application context.

[alembic]
# Path to migration scripts (packaged inside a_sdlc so they ship in the wheel)
script_location = src/a_sdlc/migrations

# Template used to generate migration scripts
file_template = %%(rev)s_%%(slug)s

# Truncate revision to a short hash in log output
truncate_slug_length = 40

# Timezone for revision timestamps (defaults to UTC)
timezone = UTC

# Separator used to split multiple version paths (os.pathsep by default)
# version_path_separator = os

# Output encoding for the generated script files
output_encoding = utf-8

# Fallback database URL -- overridden at runtime by env.py
sqlalchemy.url = sqlite:///%(here)s/data.db


[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
