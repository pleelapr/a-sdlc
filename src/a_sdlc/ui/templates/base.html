<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}a-sdlc Dashboard{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({
            startOnLoad: false,
            theme: 'dark',
            themeVariables: {
                primaryColor: '#161b22',
                primaryTextColor: '#c9d1d9',
                primaryBorderColor: '#30363d',
                lineColor: '#8b949e',
                background: '#0d1117'
            },
            flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' },
            securityLevel: 'loose'
        });
    </script>
    <style>
        :root {
            --bg: #0d1117;
            --bg-secondary: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --success: #3fb950;
            --warning: #d29922;
            --danger: #f85149;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
        
        nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1rem;
        }
        
        nav .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 2rem;
        }
        
        nav .logo {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent);
            text-decoration: none;
        }
        
        nav .nav-links { display: flex; gap: 1rem; }
        
        nav a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            transition: all 0.2s;
        }
        
        nav a:hover, nav a.active {
            color: var(--text);
            background: var(--border);
        }
        
        h1, h2, h3 { margin-bottom: 1rem; font-weight: 600; }
        h1 { font-size: 1.75rem; }
        h2 { font-size: 1.25rem; }
        
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .stat-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
        }
        
        .stat-label { color: var(--text-muted); font-size: 0.875rem; }
        
        .status-pending { color: var(--warning); }
        .status-in_progress { color: var(--accent); }
        .status-completed { color: var(--success); }
        .status-blocked { color: var(--danger); }
        .status-planned { color: var(--text-muted); }
        .status-active { color: var(--accent); }
        .status-draft { color: var(--text-muted); }
        .status-ready { color: var(--success); }
        
        .priority-critical { color: var(--danger); font-weight: 600; }
        .priority-high { color: var(--danger); }
        .priority-medium { color: var(--warning); }
        .priority-low { color: var(--text-muted); }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            text-align: left;
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        
        th { color: var(--text-muted); font-weight: 500; }
        
        tr:hover { background: var(--bg); }
        
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        
        .btn:hover { background: var(--border); }
        
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
        }
        
        .btn-primary:hover { opacity: 0.9; }
        
        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .badge-success { background: rgba(63, 185, 80, 0.2); color: var(--success); }
        .badge-warning { background: rgba(210, 153, 34, 0.2); color: var(--warning); }
        .badge-danger { background: rgba(248, 81, 73, 0.2); color: var(--danger); }
        .badge-info { background: rgba(88, 166, 255, 0.2); color: var(--accent); }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        
        .filters {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .filters select, .filters input {
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
        }

        .project-switcher {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .project-switcher label {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .project-switcher select {
            padding: 0.4rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
            font-size: 0.875rem;
            cursor: pointer;
        }

        .project-switcher select:hover {
            border-color: var(--accent);
        }
        
        pre {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            overflow-x: auto;
            font-size: 0.875rem;
        }
        
        .markdown { line-height: 1.8; }
        .markdown h1, .markdown h2, .markdown h3 { margin-top: 1.5rem; margin-bottom: 0.75rem; }
        .markdown h1 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        .markdown h2 { font-size: 1.25rem; }
        .markdown h3 { font-size: 1.1rem; }
        .markdown p { margin: 1rem 0; }
        .markdown ul, .markdown ol { padding-left: 1.5rem; margin: 1rem 0; }
        .markdown li { margin: 0.5rem 0; }
        .markdown code {
            background: var(--bg);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.875rem;
        }
        .markdown pre {
            margin: 1rem 0;
        }
        .markdown pre code {
            background: none;
            padding: 0;
        }
        .markdown blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 1rem;
            margin: 1rem 0;
            color: var(--text-muted);
        }
        .markdown table {
            margin: 1rem 0;
        }
        .markdown strong { color: var(--text); }
        .markdown a { color: var(--accent); }

        /* Tab Navigation */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
        }

        .tab {
            padding: 0.75rem 1.25rem;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
            position: relative;
            transition: color 0.2s;
        }

        .tab:hover { color: var(--text); }

        .tab.active {
            color: var(--text);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
            border-radius: 2px 2px 0 0;
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* Dependency Graph */
        .dependency-graph {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            overflow-x: auto;
            min-height: 200px;
        }
        .dependency-graph .mermaid { display: flex; justify-content: center; }
        .dependency-graph .node:hover rect { filter: brightness(1.2); cursor: pointer; }
        .graph-legend { display: flex; gap: 1.5rem; flex-wrap: wrap; font-size: 0.875rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-content">
            <a href="/" class="logo">a-sdlc</a>
            <div class="nav-links">
                <a href="/?project={{ project.id if project else '' }}" {% if request.url.path == "/" %}class="active"{% endif %}>Dashboard</a>
                <a href="/sprints?project={{ project.id if project else '' }}" {% if "/sprints" in request.url.path %}class="active"{% endif %}>Sprints</a>
                <a href="/prds?project={{ project.id if project else '' }}" {% if "/prds" in request.url.path %}class="active"{% endif %}>PRDs</a>
                <a href="/tasks?project={{ project.id if project else '' }}" {% if "/tasks" in request.url.path %}class="active"{% endif %}>Tasks</a>
                <a href="/settings?project={{ project.id if project else '' }}" {% if "/settings" in request.url.path %}class="active"{% endif %}>Settings</a>
            </div>
            {% if projects and projects|length > 1 %}
            <div class="project-switcher">
                <label for="project-select">Project:</label>
                <select id="project-select" onchange="switchProject(this.value)">
                    {% for p in projects %}
                    <option value="{{ p.id }}" {% if project and p.id == project.id %}selected{% endif %}>{{ p.name }}</option>
                    {% endfor %}
                </select>
            </div>
            {% elif project %}
            <div class="project-switcher">
                <span style="color: var(--text-muted); font-size: 0.875rem;">{{ project.name }}</span>
            </div>
            {% endif %}
        </div>
    </nav>
    <script>
        function switchProject(projectId) {
            const url = new URL(window.location.href);
            url.searchParams.set('project', projectId);
            window.location.href = url.toString();
        }
    </script>
    
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
