testing:
  defaults:
    # Required test types for all tasks (unless overridden or deemed irrelevant)
    required:
    - unit
    - integration
    # Available test types: unit, integration, e2e, performance, security, accessibility
  commands:
    # Commands to run for each test type (project-specific)
    unit: ""
    integration: ""
    e2e: ""
  coverage:
    # Minimum coverage threshold (percentage) — 0 to disable
    min_threshold: 0
  relevance:
    # Smart relevance detection — skip test types that don't apply to a change
    # When enabled, the reviewer assesses which test types are relevant based on change scope
    enabled: true

review:
  # Master toggle — set to true to enable the review system
  enabled: false
  self_review:
    # Whether implementing agent must self-review before subagent review
    enabled: true
  subagent_review:
    # Whether a fresh subagent performs independent review after self-review
    enabled: true
  # Maximum self-heal iterations before escalating to user
  max_rounds: 3
  # Require actual test command output before marking task complete
  evidence_required: true

# Quality Gates & Challenge System (SDLC-P0029)
quality:
  # Master toggle — quality gates are enabled by default
  # Set to false to disable all quality gates (opt-out)
  enabled: true

  # Block task completion when acceptance criteria are unverified
  ac_gate: true

  # Require behavioral tests (not just structural) for task completion
  behavioral_test_required: true

  # Emit warnings when coverage drops below min_coverage_pct
  coverage_warnings: true

  # Minimum test coverage percentage (0-100)
  min_coverage_pct: 80

  # Maximum remediation passes before escalating to user
  max_remediation_passes: 2

  # Challenge subsystem — adversarial review of artifacts
  challenge:
    # Enable/disable challenge rounds (default: true when quality is enabled)
    enabled: true
    # Gate mode: 'hard' (block on challenge) or 'soft' (warn only)
    gate: hard
    # Maximum challenge rounds per artifact
    max_rounds: 3
    # Token budget multiplier for challenge rounds
    budget_multiplier: 1.5
    # Per-lifecycle-point toggles — set to false to skip challenges at that stage
    gates:
      prd: true
      design: true
      split: true
      implementation: true

git:
  # Allow agent to commit changes automatically (default: false — agent stages only)
  auto_commit: false
  # Allow agent to create pull requests
  auto_pr: false
  # Allow agent to merge branches
  auto_merge: false
  # Use git worktree isolation for PRD execution
  worktree_enabled: false

# Sprint Orchestration Context Management
sprint:
  # Context budget for the orchestrator agent (estimated tokens)
  # Set to 0 to disable context tracking
  context_budget: 150000
  # Context pressure thresholds (percentage of budget)
  context_thresholds:
    warn: 70      # Log notice + save checkpoint
    urgent: 85    # Prompt user to halt or continue
    compact: 95   # Auto-compact context and continue

  # Task dispatch configuration — controls parallelism and complexity classification
  dispatch:
    # Maximum concurrent subprocess dispatches per batch (default: 3)
    max_parallel: 3
    # Complexity classification keywords and max_turns overrides
    # Tasks matching heavy keywords get more turns; light get fewer
    heavy:
      keywords: ["migration", "schema", "refactor", "redesign", "architect"]
      max_turns: 80
    medium:
      max_turns: 50
    light:
      keywords: ["test", "doc", "readme", "config", "typo", "comment", "lint"]
      components: ["test", "qa", "docs", "documentation"]
      max_turns: 20
