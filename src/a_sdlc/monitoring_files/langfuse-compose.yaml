# Langfuse (self-hosted) – conversation tracing for Claude Code
# Based on: https://github.com/langfuse/langfuse/blob/main/docker-compose.yml
# Deployed to ~/.a-sdlc/monitoring/ by `a-sdlc install --with-monitoring`

networks:
  langfuse-net:
    driver: bridge

services:
  # -- Langfuse backing stores (internal only, no host ports) ---------------

  langfuse-postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
      TZ: UTC
      PGTZ: UTC
    volumes:
      - langfuse-pg-data:/var/lib/postgresql/data
    networks:
      - langfuse-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 3s
      timeout: 3s
      retries: 10

  langfuse-redis:
    image: redis:7
    restart: unless-stopped
    command: >
      --requirepass langfuseredis
      --maxmemory-policy noeviction
    networks:
      - langfuse-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server
    restart: unless-stopped
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: langfuse
    volumes:
      - langfuse-ch-data:/var/lib/clickhouse
      - langfuse-ch-logs:/var/log/clickhouse-server
    networks:
      - langfuse-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s

  langfuse-minio:
    image: minio/minio
    restart: unless-stopped
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: langfuse
      MINIO_ROOT_PASSWORD: langfuse123
    volumes:
      - langfuse-minio-data:/data
    networks:
      - langfuse-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # -- Langfuse application services ----------------------------------------

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    restart: unless-stopped
    env_file:
      - langfuse.env
    networks:
      - langfuse-net
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy

  langfuse-web:
    image: langfuse/langfuse:3
    restart: unless-stopped
    ports:
      - "13000:3000"
    env_file:
      - langfuse.env
    networks:
      - langfuse-net
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy

volumes:
  langfuse-pg-data:
  langfuse-ch-data:
  langfuse-ch-logs:
  langfuse-minio-data:
